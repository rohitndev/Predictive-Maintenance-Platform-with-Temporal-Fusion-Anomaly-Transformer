name: Build & Deploy (AWS Lambda)

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

permissions:
  id-token: write   # Keyless auth via OIDC (no long-lived AWS keys)
  contents: read

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: predictive-maintenance-serving

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          docker build -t $REGISTRY/$ECR_REPOSITORY:${{ github.sha }} -f deployment/Dockerfile .
          docker push $REGISTRY/$ECR_REPOSITORY:${{ github.sha }}

      - name: Update Lambda function
        run: |
          aws lambda update-function-code \
            --function-name predictive-maintenance-serving \
            --image-uri ${{ steps.ecr.outputs.registry }}/$ECR_REPOSITORY:${{ github.sha }}
